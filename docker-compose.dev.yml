services:

  # ── Reverse proxy ────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8090:8080"      # dashboard → http://localhost:8090/dashboard/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - learnpulse
    restart: unless-stopped

  # ── Databases ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: learnpulse
      MYSQL_PASSWORD: learnpulse
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ulearnpulse", "-plearnpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Kafka (KRaft — no Zookeeper) ──────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT  — internal (container-to-container)
      # EXTERNAL   — host machine access on port 9094
      # CONTROLLER — KRaft metadata channel
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/bitnami/kafka
    ports:
      - "9094:9094"      # host access; internal services use kafka:9092
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Creates all topics + DLQs on first boot; exits 0 when done.
  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/topics.sh:/topics.sh:ro
    entrypoint: ["/bin/bash", "/topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    networks:
      - learnpulse
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"
    networks:
      - learnpulse
    labels:
      traefik.enable: "true"
      traefik.http.routers.kafka-ui.rule: Host(`kafka-ui.localhost`)
      traefik.http.services.kafka-ui.loadbalancer.server.port: "8080"
    restart: unless-stopped

  # ── Mail catcher (dev only) ───────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP — course-service sends here
      - "8025:8025"   # Web UI → http://localhost:8025
    networks:
      - learnpulse
    labels:
      traefik.enable: "true"
      traefik.http.routers.mailhog.rule: Host(`mailhog.localhost`)
      traefik.http.services.mailhog.loadbalancer.server.port: "8025"
    restart: unless-stopped

  # ── Object storage (S3-compatible) ────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9010:9000"      # S3 API  (set S3_ENDPOINT=http://localhost:9010 from host; container-to-container stays minio:9000)
      - "9001:9001"      # web console
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.minio-console.rule: Host(`minio.localhost`)
      traefik.http.services.minio-console.loadbalancer.server.port: "9001"
    restart: unless-stopped

  # Creates the learnpulse bucket on first boot; exits 0 when done.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/learnpulse &&
        mc anonymous set download local/learnpulse/certificates &&
        echo 'MinIO bucket ready.'
      "
    networks:
      - learnpulse
    restart: on-failure

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  minio-data:

networks:
  learnpulse:
    driver: bridge
