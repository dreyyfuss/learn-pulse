services:

  # ── Reverse proxy ────────────────────────────────────────────
  traefik:
    image: traefik:v3
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=learnpulse
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/traefik.dev.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "8090:8080"      # dashboard → http://localhost:8090/dashboard/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.dev.yml:/etc/traefik/traefik.dev.yml:ro
    networks:
      - learnpulse
    restart: unless-stopped

  # ── Databases ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: learnpulse
      MYSQL_PASSWORD: learnpulse
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ulearnpulse", "-plearnpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Kafka (KRaft — no Zookeeper) ──────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    environment:
      CLUSTER_ID: 4R1jZ7skRIKXsFNsRRGcEg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT  — internal (container-to-container)
      # EXTERNAL   — host machine access on port 9094
      # CONTROLLER — KRaft metadata channel
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9094:9094"      # host access; internal services use kafka:9092
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Creates all topics + DLQs on first boot; exits 0 when done.
  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/topics.sh:/topics.sh:ro
    entrypoint: ["/bin/bash", "/topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    networks:
      - learnpulse
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      traefik.enable: "true"
      traefik.http.routers.kafka-ui.rule: Host(`kafka-ui.localhost`)
      traefik.http.services.kafka-ui.loadbalancer.server.port: "8080"
    restart: unless-stopped

  # ── Object storage (S3-compatible) ────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9010:9000"      # S3 API  (set S3_ENDPOINT=http://localhost:9010 from host; container-to-container stays minio:9000)
      - "9001:9001"      # web console
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.minio-console.rule: Host(`minio.localhost`)
      traefik.http.services.minio-console.loadbalancer.server.port: "9001"
    restart: unless-stopped

  # Creates the learnpulse bucket on first boot; exits 0 when done.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/learnpulse &&
        mc anonymous set download local/learnpulse/certificates &&
        echo 'MinIO bucket ready.'
      "
    networks:
      - learnpulse
    restart: on-failure

  # ── Application Services ─────────────────────────────────────
  user-service:
    build:
      context: ./apps/user-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - learnpulse
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    labels:
      traefik.enable: "true"
      traefik.http.routers.user-svc.rule: "PathPrefix(`/api/users`) || PathPrefix(`/api/auth`)"
      traefik.http.routers.user-svc.entrypoints: web
      traefik.http.routers.user-svc.priority: "20"
      traefik.http.routers.user-svc.middlewares: strip-api@file
      traefik.http.services.user-svc.loadbalancer.server.port: "8081"
    restart: unless-stopped

  course-service:
    build:
      context: ./apps/course-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - learnpulse
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    labels:
      traefik.enable: "true"
      # catch-all for /api/* — lower priority than user-svc and cert-svc (file provider)
      traefik.http.routers.course-svc.rule: "PathPrefix(`/api`)"
      traefik.http.routers.course-svc.entrypoints: web
      traefik.http.routers.course-svc.priority: "10"
      traefik.http.routers.course-svc.middlewares: strip-api@file
      traefik.http.services.course-svc.loadbalancer.server.port: "8080"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  minio-data:

networks:
  learnpulse:
    driver: bridge
