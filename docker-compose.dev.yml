services:

  # ── Reverse proxy ────────────────────────────────────────────
  traefik:
    image: traefik:v3
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=learnpulse
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/traefik.dev.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "8090:8080"      # dashboard → http://localhost:8090/dashboard/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.dev.yml:/etc/traefik/traefik.dev.yml:ro
    networks:
      - learnpulse
    restart: unless-stopped

  # ── Databases ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: learnpulse
      MYSQL_PASSWORD: learnpulse
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ulearnpulse", "-plearnpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Kafka (KRaft — no Zookeeper) ──────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    environment:
      CLUSTER_ID: 4R1jZ7skRIKXsFNsRRGcEg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT  — internal (container-to-container)
      # EXTERNAL   — host machine access on port 9094
      # CONTROLLER — KRaft metadata channel
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      # Required for single-broker dev: default replication factor is 3,
      # which can never be satisfied with one broker and silently breaks
      # __consumer_offsets auto-creation.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9094:9094"      # host access; internal services use kafka:9092
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Creates all topics + DLQs on first boot; exits 0 when done.
  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/topics.sh:/topics.sh:ro
    entrypoint: ["/bin/bash", "/topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    networks:
      - learnpulse
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      traefik.enable: "true"
      traefik.http.routers.kafka-ui.rule: Host(`kafka-ui.localhost`)
      traefik.http.services.kafka-ui.loadbalancer.server.port: "8080"
    restart: unless-stopped

  # ── Object storage (S3-compatible) ────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9010:9000"      # S3 API  (set S3_ENDPOINT=http://localhost:9010 from host; container-to-container stays minio:9000)
      - "9001:9001"      # web console
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.minio-console.rule: Host(`minio.localhost`)
      traefik.http.services.minio-console.loadbalancer.server.port: "9001"
    restart: unless-stopped

  # Creates the learnpulse bucket and sets certificates folder public.
  # MinIO handles CORS globally via cors_allow_origin=* (default), so no per-bucket CORS setup needed.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/learnpulse &&
        mc anonymous set download local/learnpulse/certificates &&
        echo 'MinIO bucket ready.'
    networks:
      - learnpulse
    restart: on-failure

  # ── Vector store ──────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - learnpulse
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Application Services ─────────────────────────────────────
  user-service:
    build:
      context: ./apps/user-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: "jdbc:mysql://mysql:3306/learnpulse_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      KAFKA_SERVERS: kafka:9092
    networks:
      - learnpulse
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    labels:
      traefik.enable: "true"
      # Public auth routes — rate-limited but NO ForwardAuth (login/register/validate are public)
      traefik.http.routers.user-svc-public.rule: "PathPrefix(`/api/auth`)"
      traefik.http.routers.user-svc-public.entrypoints: web
      traefik.http.routers.user-svc-public.priority: "30"
      traefik.http.routers.user-svc-public.middlewares: auth-ratelimit@file
      traefik.http.routers.user-svc-public.service: user-svc
      # Protected user/admin routes — ForwardAuth validates the JWT first
      traefik.http.routers.user-svc-protected.rule: "PathPrefix(`/api/users`) || PathPrefix(`/api/admin/users`)"
      traefik.http.routers.user-svc-protected.entrypoints: web
      traefik.http.routers.user-svc-protected.priority: "25"
      traefik.http.routers.user-svc-protected.middlewares: jwt-auth@file
      traefik.http.routers.user-svc-protected.service: user-svc
      traefik.http.services.user-svc.loadbalancer.server.port: "8081"
    restart: unless-stopped

  cert-service:
    build:
      context: ./apps/cert-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: "jdbc:mysql://mysql:3306/learnpulse_certs?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      KAFKA_SERVERS: kafka:9092
      S3_ENDPOINT: "http://minio:9000"
      APP_S3_PUBLIC_ENDPOINT: "http://localhost:9010"
    networks:
      - learnpulse
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    labels:
      traefik.enable: "true"
      traefik.http.routers.cert-svc.rule: "PathPrefix(`/api/learner/certificates`) || PathPrefix(`/api/certificates`)"
      traefik.http.routers.cert-svc.entrypoints: web
      traefik.http.routers.cert-svc.priority: "25"
      traefik.http.routers.cert-svc.middlewares: jwt-auth@file
      traefik.http.services.cert-svc.loadbalancer.server.port: "8082"
    restart: unless-stopped

  course-service:
    build:
      context: ./apps/course-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: "jdbc:mysql://mysql:3306/course_service_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      KAFKA_SERVERS: kafka:9092
      S3_ENDPOINT: "http://minio:9000"
      APP_S3_ACCESS_KEY: "minioadmin"
      APP_S3_SECRET_KEY: "minioadmin"
      APP_S3_PUBLIC_ENDPOINT: "http://localhost:9010"
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-change-me-in-dev}
    networks:
      - learnpulse
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    labels:
      traefik.enable: "true"
      # catch-all for /api/* — lower priority than user-svc, cert-svc, and ai-svc
      traefik.http.routers.course-svc.rule: "PathPrefix(`/api`)"
      traefik.http.routers.course-svc.entrypoints: web
      traefik.http.routers.course-svc.priority: "10"
      traefik.http.routers.course-svc.middlewares: jwt-auth@file
      traefik.http.services.course-svc.loadbalancer.server.port: "8080"
    restart: unless-stopped

  # ── AI Service ────────────────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      REDIS_URL: redis://redis:6379
      COURSE_SERVICE_URL: http://course-service:8080
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-change-me-in-dev}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-llama-3.1-8b}
    networks:
      - learnpulse
    ports:
      - "9000:9000"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.ai-svc.rule: "PathPrefix(`/api/ai`)"
      traefik.http.routers.ai-svc.entrypoints: web
      traefik.http.routers.ai-svc.priority: "20"
      traefik.http.routers.ai-svc.middlewares: jwt-auth@file
      traefik.http.services.ai-svc.loadbalancer.server.port: "9000"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  minio-data:
  chroma-data:

networks:
  learnpulse:
    driver: bridge
