name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Frontend: build + dependency audit ───────────────────────
  frontend-ci:
    name: Frontend — build & npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Vite production build
        run: npm run build

      - name: npm audit (high & critical only)
        run: npm audit --audit-level=high --omit=dev

  # ── AI service: Python dependency audit ──────────────────────
  python-audit:
    name: AI service — pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies (high & critical)
        run: pip-audit -r apps/ai-service/requirements.txt --severity high

  # ── CVE scan: Trivy filesystem scan ──────────────────────────
  trivy-scan:
    name: Trivy — CVE scan (HIGH & CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan repo for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  # ── Deploy: only after all checks pass, only on main ─────────
  deploy:
    name: Deploy to VPS
    needs: [frontend-ci, python-audit, trivy-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_S3_PUBLIC_ENDPOINT: ${{ secrets.APP_S3_PUBLIC_ENDPOINT }}
          SERVICE_AUTH_SECRET: ${{ secrets.SERVICE_AUTH_SECRET }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_S3_PUBLIC_ENDPOINT,SERVICE_AUTH_SECRET,CEREBRAS_API_KEY,GROQ_API_KEY,MAILGUN_API_KEY,MAILGUN_DOMAIN,MAILGUN_FROM
          script: |
            set -e
            cd /home/ubuntu/learn-pulse
            git pull origin main
            printf 'APP_S3_PUBLIC_ENDPOINT=%s\nSERVICE_AUTH_SECRET=%s\nCEREBRAS_API_KEY=%s\nCEREBRAS_MODEL=llama-3.3-70b\nGROQ_API_KEY=%s\nMAILGUN_API_KEY=%s\nMAILGUN_DOMAIN=%s\nMAILGUN_FROM=%s\n' \
              "$APP_S3_PUBLIC_ENDPOINT" \
              "$SERVICE_AUTH_SECRET" \
              "$CEREBRAS_API_KEY" \
              "$GROQ_API_KEY" \
              "$MAILGUN_API_KEY" \
              "$MAILGUN_DOMAIN" \
              "$MAILGUN_FROM" \
              > .env
            docker compose up -d --build --remove-orphans

  # ── E2E smoke: runs against production after deploy ──────────
  # Activate by setting the E2E_BASE_URL Actions variable in repo settings.
  e2e-smoke:
    name: E2E smoke — post-deploy
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.E2E_BASE_URL != ''
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests against production
        run: npx playwright test e2e/smoke.spec.js
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_LEARNER_EMAIL: ${{ secrets.E2E_LEARNER_EMAIL }}
          E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD }}

      - name: Run golden-path tests against production
        run: npx playwright test e2e/golden-path.spec.js
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_LEARNER_EMAIL: ${{ secrets.E2E_LEARNER_EMAIL }}
          E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD }}
          E2E_COURSE_TITLE: ${{ vars.E2E_COURSE_TITLE }}
          E2E_ENROLMENT_CODE: ${{ secrets.E2E_ENROLMENT_CODE }}

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7