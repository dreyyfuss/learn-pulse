## Traefik dynamic configuration — dev (no TLS)
## Loaded via --providers.file.filename in docker-compose.dev.yml.
## Service containers add their own routers/services via Docker labels;
## this file owns only middlewares + the SPA catch-all route.

http:

  # ── Middlewares ───────────────────────────────────────────────
  middlewares:

    auth-ratelimit:
      rateLimit:
        average: 10       # sustained rate: 10 req/min
        period: 60s
        burst: 5

    # ForwardAuth — called by Traefik on every protected request.
    # User Service validates the JWT and returns X-User-* headers on success.
    # authResponseHeaders are forwarded to the upstream backend.
    jwt-auth:
      forwardAuth:
        address: "http://user-service:8081/api/auth/validate"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Email"
          - "X-User-Roles"

  # ── SPA catch-all (not yet a compose container) ───────────────
  routers:
    web-svc:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: web-svc
      priority: 1

  services:
    web-svc:
      loadBalancer:
        servers:
          - url: "http://web:80"
