spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/learnpulse_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:learnpulse}
    password: ${DB_PASSWORD:learnpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:learnpulse-user-svc-dev-only-secret-key-not-for-prod-use}
  access-token-expiry: 900       # 15 minutes
  refresh-token-expiry: 604800   # 7 days

logging:
  level:
    com.userservice: INFO
    org.springframework.security: WARN
