spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/learnpulse_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:learnpulse}
    password: ${DB_PASSWORD:learnpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: email-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed
        max.poll.records: 10

mailgun:
  api-key: ${MAILGUN_API_KEY:}
  domain: ${MAILGUN_DOMAIN:sandbox.mailgun.org}
  from: ${MAILGUN_FROM:noreply@learnpulse.dev}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

jwt:
  secret: ${JWT_SECRET:learnpulse-user-svc-dev-only-secret-key-not-for-prod-use}
  access-token-expiry: 900       # 15 minutes
  refresh-token-expiry: 604800   # 7 days

logging:
  level:
    com.userservice: INFO
    org.springframework.security: WARN
