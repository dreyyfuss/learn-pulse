spring:
  application:
    name: course-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/course_service_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:learnpulse}
    password: ${DB_PASSWORD:learnpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false   # allows editing migration files during active development

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: course-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.courseservice.events.dto
        isolation.level: read_committed

app:
  jwt:
    secret: ${JWT_SECRET:learnpulse-default-jwt-secret-key-change-this-in-production-must-be-32plus-chars}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}      # 15 minutes
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000} # 7 days

  admin:
    email: ${ADMIN_EMAIL:admin@learnpulse.com}
    password: ${ADMIN_PASSWORD:Admin@LearnPulse1}
    full-name: ${ADMIN_NAME:Platform Admin}

  s3:
    bucket: ${S3_BUCKET:learnpulse}
    endpoint: ${S3_ENDPOINT:}        # leave empty for real AWS; set to MinIO URL for dev
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}   # AWS_ACCESS_KEY_ID or MinIO root user
    secret-key: ${S3_SECRET_KEY:minioadmin}   # AWS_SECRET_ACCESS_KEY or MinIO root password

  mailgun:
    api-key: ${MAILGUN_API_KEY:}
    domain: ${MAILGUN_DOMAIN:}
    from: ${MAILGUN_FROM:noreply@learnpulse.com}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.courseservice: INFO
    org.springframework.security: WARN
