spring:
  application:
    name: cert-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/learnpulse_certs?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:learnpulse}
    password: ${DB_PASSWORD:learnpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9094}
    consumer:
      group-id: cert-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.certservice.events.dto

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  s3:
    bucket: ${S3_BUCKET:learnpulse}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}

logging:
  level:
    com.certservice: INFO
    org.springframework.security: WARN
