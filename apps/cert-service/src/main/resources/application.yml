spring:
  application:
    name: cert-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/learnpulse_certs?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:learnpulse}
    password: ${DB_PASSWORD:learnpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9094}
    consumer:
      group-id: certificate-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed
        max.poll.records: 5

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

app:
  s3:
    bucket: ${S3_BUCKET:learnpulse}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
  user-service-url: ${USER_SERVICE_URL:http://user-service:8081}
  course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}

logging:
  level:
    com.certservice: INFO
    org.springframework.security: WARN
