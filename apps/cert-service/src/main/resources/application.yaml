spring:
  application:
    name: cert-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/learnpulse_certs?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: certificate-service
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 2147483647

server:
  port: ${PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  s3:
    bucket: ${S3_BUCKET:learnpulse}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}

  jwt:
    secret: ${JWT_SECRET:learnpulse-default-jwt-secret-key-change-this-in-production-must-be-32plus-chars}

  services:
    course-service-url: ${COURSE_SERVICE_URL:http://localhost:8080}
    user-service-url: ${USER_SERVICE_URL:http://localhost:8081}

  kafka:
    cert:
      backoff:
        initial-ms: 1000
        multiplier: 4.0
        max-elapsed-ms: 300000
